name: "Release"

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: windows-latest
    name: "Build and Release"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache godot-cpp build
        uses: actions/cache@v4
        with:
          path: gdextension/build
          key: gdextension-${{ runner.os }}-${{ hashFiles('gdextension/godot-cpp/CMakeLists.txt', 'gdextension/CMakeLists.txt') }}

      - name: Build debug DLL
        run: |
          cmake -B gdextension/build/debug -S gdextension -G Ninja `
            -DCMAKE_BUILD_TYPE=Debug -DGODOT_TARGET=template_debug
          cmake --build gdextension/build/debug

      - name: Build release DLL
        run: |
          cmake -B gdextension/build/release -S gdextension -G Ninja `
            -DCMAKE_BUILD_TYPE=Release -DGODOT_TARGET=template_release
          cmake --build gdextension/build/release

      - name: Package addon
        run: Compress-Archive -Path addons/windows_mouse_passthrough -DestinationPath windows_mouse_passthrough-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: windows_mouse_passthrough-${{ github.ref_name }}.zip
          generate_release_notes: true
