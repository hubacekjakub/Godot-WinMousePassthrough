<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2340"/>
      <stop offset="100%" stop-color="#0d1120"/>
    </linearGradient>
    <radialGradient id="glow" cx="0%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#4a8fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4a8fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>

  <!-- Window frame -->
  <rect x="18" y="24" width="92" height="70" rx="7"
        fill="#ffffff" fill-opacity="0.04"
        stroke="#4a8fff" stroke-width="2.5"/>

  <!-- Title bar -->
  <path d="M18,31 Q18,24 25,24 L103,24 Q110,24 110,31 L110,42 L18,42 Z"
        fill="#4a8fff" fill-opacity="0.2"/>
  <line x1="18" y1="42" x2="110" y2="42" stroke="#4a8fff" stroke-width="1" opacity="0.5"/>

  <!-- Traffic lights -->
  <circle cx="31" cy="33" r="3.5" fill="#ff5f57"/>
  <circle cx="43" cy="33" r="3.5" fill="#febc2e"/>
  <circle cx="55" cy="33" r="3.5" fill="#28c840"/>

  <!-- Faint window content lines -->
  <rect x="28" y="54" width="44" height="3" rx="1.5" fill="#4a8fff" fill-opacity="0.12"/>
  <rect x="28" y="63" width="28" height="3" rx="1.5" fill="#4a8fff" fill-opacity="0.08"/>

  <!-- Cursor glow at hotspot (44, 50) -->
  <circle cx="44" cy="50" r="16" fill="url(#glow)" opacity="0.55"/>
  <circle cx="44" cy="50" r="8"  fill="#4a8fff" fill-opacity="0.20"/>

  <!-- Sparkle lines radiating from tip -->
  <line x1="44" y1="43" x2="44" y2="37" stroke="#6aaeff" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="38" y1="45" x2="33" y2="40" stroke="#6aaeff" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="37" y1="51" x2="31" y2="51" stroke="#6aaeff" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>

  <!-- Cursor drop shadow -->
  <polygon points="44,50 44,80 52,72 56,84 61,82 57,70 65,70"
           fill="#000000" fill-opacity="0.35" transform="translate(2,2)"/>

  <!-- Cursor (arrow pointing top-left, tip at 44,50) -->
  <polygon points="44,50 44,80 52,72 56,84 61,82 57,70 65,70"
           fill="white" stroke="#1a1f3a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Bright dot at cursor tip -->
  <circle cx="44" cy="50" r="2.8" fill="#9ecaff" opacity="0.95"/>
</svg>
